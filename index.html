<!DOCTYPE html>
<html>
<head>
  <title>Arb Detector</title>
  <style>
    body {
      font-family: monospace;
      padding: 20px;
      background: #0f0f0f;
      color: #eee;
    }

    h2 {
      color: #4ade80;
    }

    .stats {
      display: flex;
      gap: 30px;
      margin-bottom: 20px;
      color: #888;
      font-size: 13px;
    }

    .stats span {
      color: #4ade80;
      font-weight: bold;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th {
      text-align: left;
      padding: 10px;
      border-bottom: 2px solid #4ade80;
      color: #4ade80;
    }

    td {
      padding: 10px;
      border-bottom: 1px solid #333;
    }

    .arb {
      color: #4ade80;
      font-weight: bold;
    }

    .no-data {
      color: #888;
      padding: 20px 0;
    }

    .time {
      color: #888;
      font-size: 11px;
    }

    .log {
      margin-top: 30px;
      border-top: 1px solid #333;
      padding-top: 15px;
    }

    .log h3 {
      color: #4ade80;
      margin-bottom: 10px;
    }

    .log-entry {
      padding: 6px 0;
      border-bottom: 1px solid #1a1a1a;
      font-size: 13px;
    }

    .log-entry .found {
      color: #4ade80;
    }

    .log-entry .none {
      color: #555;
    }
  </style>
</head>
<body>
  <h2>Live Arb Opportunities</h2>

  <div class="stats">
    <div>Status: <span id="status">Connecting...</span></div>
    <div>Last Scanned: <span id="lastScanned">-</span></div>
    <div>Pairs Monitored: <span id="totalPairs">-</span></div>
    <div>Total Arb Found: <span id="totalFound">0</span></div>
  </div>

  <table>
    <thead>
      <tr>
        <th>Market</th>
        <th>YES</th>
        <th>NO </th>
        <th>Total</th>
        <th>Profit</th>
        <th>Detected At</th>
      </tr>
    </thead>
    <tbody id="tbody">
      <tr>
        <td colspan="6" class="no-data">Waiting for first scan...</td>
      </tr>
    </tbody>
  </table>

  <div class="log">
    <h3>Scan History</h3>
    <div id="log"></div>
  </div>

  <script>
    let totalFound = 0
    const maxLogEntries = 20

    async function refresh() {
      try {
        const res = await fetch('http://localhost:3000/opportunities')
        const data = await res.json()

        const now = new Date().toLocaleTimeString()

        // update stats
        document.getElementById('status').textContent = 'Live'
        document.getElementById('lastScanned').textContent = data.lastScanned
        document.getElementById('totalPairs').textContent = data.totalPairs

        // update table
        const tbody = document.getElementById('tbody')

        if (data.opportunities.length === 0) {
          tbody.innerHTML = '<tr><td colspan="6" class="no-data">No arb opportunities right now. Scanning...</td></tr>'
        } else {
          totalFound += data.opportunities.length
          document.getElementById('totalFound').textContent = totalFound

          tbody.innerHTML = data.opportunities.map(op => `
            <tr>
              <td>${op.market}</td>
              <td>${op.yesPrice.toFixed(3)}</td>
              <td>${op.noPrice.toFixed(3)}</td>
              <td>${op.total.toFixed(3)}</td>
              <td class="arb">+${(op.profit * 100).toFixed(2)}%</td>
              <td class="time">${now}</td>
            </tr>
          `).join('')
        }

        // add to scan log
        const log = document.getElementById('log')
        const entry = document.createElement('div')
        entry.className = 'log-entry'

        if (data.opportunities.length > 0) {
          entry.innerHTML = `
            <span class="time">${now}</span> — 
            <span class="found">⚡ ${data.opportunities.length} arb found</span> → 
            ${data.opportunities.map(o => `${o.market} (+${(o.profit * 100).toFixed(2)}%)`).join(', ')}
          `
        } else {
          entry.innerHTML = `
            <span class="time">${now}</span> — 
            <span class="none">No arb this scan</span>
          `
        }

        // add new entry at top
        log.insertBefore(entry, log.firstChild)


      } catch (err) {
        document.getElementById('status').textContent = 'Server offline - retrying...'
      }
    }

    setInterval(refresh, 1000)
    refresh()
  </script>
</body>
</html>
